# HTTP → HTTPS redirect (managed by certbot after SSL setup)
server {
    listen 80;
    server_name bazzar.souluze.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# HTTPS (auto-configured by certbot)
# After running: certbot --nginx -d bazzar.souluze.com
# Certbot will automatically modify this file to add SSL config
